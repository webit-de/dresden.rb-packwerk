<h1 id="motivation">Motivation</h1>
<h2 id="the-pain-of-a-growing-monolith">The pain of a growing monolith</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-header="Motivation" data-class="quote" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" class="quote" data-marpit-pagination="4" style="--paginate:true;--header:Motivation;--class:quote;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Motivation</header>

<blockquote>
<h1 id="have-you-ever-made-a-code-change-that-suddenly-broke-things-you-had-nothing-to-do-with">Have you ever made a code change that suddenly broke things you had nothing to do with?</h1>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-paginate="true" data-header="Motivation" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" data-marpit-pagination="5" style="--paginate:true;--header:Motivation;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23" data-marpit-advanced-background="background"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;cohesion.png&quot;);background-size:contain;"></figure></div></section></foreignObject><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-header="Motivation" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" data-marpit-pagination="5" style="--paginate:true;--header:Motivation;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23" data-marpit-advanced-background="content">
<header>Motivation</header>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-paginate="true" data-header="Motivation" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" data-marpit-pagination="5" style="" data-marpit-pagination-total="23" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-header="Motivation" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" data-marpit-pagination="6" style="--paginate:true;--header:Motivation;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Motivation</header>
<h2 id="rails-provides-structure--but-not-enough">Rails provides structure — but not enough</h2>
<blockquote>
<p>Rails gives you a structure for files.<br />
Who is allowed to talk to whom — nobody enforces that.</p>
</blockquote>
<p>MVC and Convention over Configuration don't solve the problem of dependencies.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-header="Motivation" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" data-marpit-pagination="7" style="--paginate:true;--header:Motivation;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Motivation</header>
<h2 id="why-not-just-rely-on-discipline">Why not just rely on discipline?</h2>
<ul>
<li>People forget rules.</li>
<li>New developers don't know them.</li>
<li>Time pressure always wins.</li>
</ul>
<blockquote>
<p>Code reviews scale worse than automated rules.</p>
</blockquote>
<p>→ How do you make dependencies <strong>visible — and rules enforceable?</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-header="Packwerk" data-class="section" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" class="section" data-marpit-pagination="8" style="--paginate:true;--header:Packwerk;--class:section;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Packwerk</header>

<h1 id="packwerk-1">Packwerk</h1>
<h2 id="what-is-it-how-does-it-work">What is it, how does it work?</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-header="Packwerk" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" data-marpit-pagination="9" style="--paginate:true;--header:Packwerk;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Packwerk</header>
<h2 id="where-does-packwerk-come-from">Where does Packwerk come from?</h2>
<p>Shopify developed it for their large monolithic system and released it in September 2020.</p>
<blockquote>
<p>Packwerk is a linter for architectural boundaries.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-header="Packwerk" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" data-marpit-pagination="10" style="--paginate:true;--header:Packwerk;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Packwerk</header>
<h2 id="three-core-concepts">Three core concepts</h2>
<ul>
<li><strong>Package</strong> — Directory with <code>package.yml</code>, defines a (business) unit <code>packs/billing</code>, <code>packs/users</code>, …</li>
<li><strong>Privacy</strong> — Classes can be <code>private</code>: only the owning package may use them.</li>
<li><strong>Dependency</strong> — A package explicitly declares which other packages it is allowed to use.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-header="Packwerk" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" data-marpit-pagination="11" style="--paginate:true;--header:Packwerk;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Packwerk</header>
<h2 id="the-tool">The tool</h2>
<ul>
<li>Static analysis checker
<ul>
<li>reads code, reports violations</li>
<li>no runtime magic, no framework lock-in</li>
</ul>
</li>
</ul>
<blockquote>
<p>Packwerk does not tie the code more tightly to Rails — nor to Packwerk itself.</p>
</blockquote>
<ul>
<li><strong><code>package_todo.yml</code></strong>
<ul>
<li>Existing violations can be documented rather than fixed immediately — a pragmatic entry point in legacy projects.</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-header="Packwerk" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" data-marpit-pagination="12" style="--paginate:true;--header:Packwerk;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Packwerk</header>
<h2 id="comparison-overview">Comparison overview</h2>
<table>
<thead>
<tr>
<th>Approach</th>
<th>Advantage</th>
<th>Disadvantage</th>
</tr>
</thead>
<tbody>
<tr>
<td>Rails monolith</td>
<td>Fast</td>
<td>Entropy</td>
</tr>
<tr>
<td>Rails Engines</td>
<td>Stronger isolation</td>
<td>Heavyweight</td>
</tr>
<tr>
<td>Microservices</td>
<td>Clear boundaries</td>
<td>Operational hell</td>
</tr>
<tr>
<td><strong>Packwerk</strong></td>
<td><strong>Lightweight boundary enforcement</strong></td>
<td><strong>Static analysis only</strong></td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-header="Usage at webit!" data-class="section" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" class="section" data-marpit-pagination="13" style="--paginate:true;--header:Usage at webit!;--class:section;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Usage at webit!</header>

<h1 id="usage-at-webit">Usage at webit!</h1>
<h2 id="how-do-we-use-packwerk-at-webit">How do we use Packwerk at webit!?</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-header="Usage at webit!" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" data-marpit-pagination="14" style="--paginate:true;--header:Usage at webit!;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Usage at webit!</header>
<h2 id="jack--a-real-world-example">JACK — A real-world example</h2>
<p>JACK is a platform for planning and delivering food for large-scale kitchens.</p>
<ul>
<li>Packwerk in use <strong>from day one</strong></li>
<li><strong>23 packages</strong> in total</li>
<li><strong>5 domain packages:</strong> <code>order_management</code>, <code>portioning</code>, <code>commissioning</code>, <code>material_tracking</code>, <code>logistics</code></li>
<li>each with sub-packages: <code>domain</code>, <code>infrastructure</code>, <code>application</code>, <code>core_extension</code></li>
<li><strong>3 base packages:</strong> <code>core</code>, <code>architecture_core</code>, <code>events</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-header="Usage at webit!" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" data-marpit-pagination="15" style="--paginate:true;--header:Usage at webit!;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Usage at webit!</header>
<h2 id="structure-of-a-domain-package">Structure of a domain package</h2>
<p>Packwerk enforces boundaries between domains — and between the <strong>layers within</strong> a domain:</p>
<pre><code>lib/packages/portioning/
├── public/           ← visible to all other packages
├── domain/           ← own package · visible_to: [portioning]
├── infrastructure/   ← own package · visible_to: [portioning]
├── application/      ← own package · visible_to: [portioning]
└── core_extension/   ← shared base types for other packages
</code></pre>
<p>Cross-package references via UUIDs only — no ActiveRecord associations.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-header="Usage at webit!" data-class="quote" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" class="quote" data-marpit-pagination="16" style="--paginate:true;--header:Usage at webit!;--class:quote;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Usage at webit!</header>

<blockquote>
<h1 id="packwerk-doesnt-fix-bad-architecture">Packwerk doesn't fix bad architecture.</h1>
<h1 id="it-makes-bad-architecture-visible">It makes bad architecture visible.</h1>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-header="Usage at webit!" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" data-marpit-pagination="17" style="--paginate:true;--header:Usage at webit!;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Usage at webit!</header>
<h2 id="what-worked-well">What worked well?</h2>
<ul>
<li>Loose coupling of domain aspects through packages with a well-defined public API</li>
<li>Strict architectural rules via sub-packages — domain layer free of external dependencies (DDD)</li>
<li>Tasks easy to parallelize thanks to clear package boundaries</li>
<li>Refactoring within a package without external impact — thanks to a stable public API</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-header="Usage at webit!" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" data-marpit-pagination="18" style="--paginate:true;--header:Usage at webit!;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Usage at webit!</header>
<h2 id="what-challenges-did-we-face">What challenges did we face?</h2>
<ul>
<li>Finding the right package structure and size is non-trivial — wrong divisions cost time when restructuring</li>
<li>Team consensus on architectural rules is necessary — lack of shared knowledge creates friction</li>
<li>UI aggregation across multiple packages more involved than in a classic monolith</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-header="Conclusion" data-class="section" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" class="section" data-marpit-pagination="19" style="--paginate:true;--header:Conclusion;--class:section;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Conclusion</header>

<h1 id="conclusion">Conclusion</h1>
<h2 id="when-is-packwerk-worth-using">When is Packwerk worth using?</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-header="Conclusion" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" data-marpit-pagination="20" style="--paginate:true;--header:Conclusion;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Conclusion</header>
<h2 id="when-is-packwerk-worth-it">When is Packwerk worth it?</h2>
<p><strong>Yes, when:</strong></p>
<ul>
<li>Long-term life of a Rails monolith, especially when multiple teams work on it</li>
<li>When architectural smells appear, e.g. via <a href="https://github.com/emad-elsaid/rubrowser">Rubrowser</a></li>
<li>When services are a long-term goal but the timing hasn't come yet</li>
</ul>
<p><strong>Rather not, when:</strong></p>
<ul>
<li>Projects in early phase — find the product first, then add structure</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-header="Conclusion" data-class="quote" data-theme="l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf" lang="de-DE" class="quote" data-marpit-pagination="21" style="--paginate:true;--header:Conclusion;--class:quote;--theme:l13rlfxqwcdoiay5rlo6lc3bpim6wb4jlvy71qtbcewf;" data-marpit-pagination-total="23">
<header>Conclusion</header>

<blockquote>
<h1 id="ai-writes-code-faster-than-humans-can-review-and-verify-it-in-depth">AI writes code faster than humans can review and verify it in depth.</h1>
<h1 id="well-structured-code-makes-that-easier-packwerk-enforces-that-structure">Well-structured code makes that easier. Packwerk enforces that structure.</h1>
</blockquote>
</section>
